name: Refresh stats card

on:
  schedule:
    - cron: "30 2 * * *"   # daily
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate SVGs from live data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/gen_stats.py
          python scripts/gen_built.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/built-*.svg
          git diff --cached --quiet || git commit -m "chore: refresh generated cards"
          git push
