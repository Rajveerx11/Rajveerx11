<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 120" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, monospace">
  <defs>
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36bcf7"/>
      <stop offset="0.5" stop-color="#a371f7"/>
      <stop offset="1" stop-color="#36bcf7"/>
    </linearGradient>
  </defs>
  <rect x="1.5" y="1.5" width="857" height="117" rx="14" fill="#0d1117" stroke="#1f2a3d" stroke-width="1.5"/>
  <rect x="1.5" y="1.5" width="857" height="117" rx="14" fill="none" stroke="url(#ng)" stroke-width="1.5" stroke-dasharray="40 1910" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="0;-1950" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- tile grid mark: tiles light up one by one -->
  <g>
    <rect x="28" y="30" width="26" height="26" rx="6" fill="#36bcf7" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="4s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="30" width="26" height="26" rx="6" fill="#a371f7" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="4s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="28" y="62" width="26" height="26" rx="6" fill="#a371f7" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="4s" begin="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="62" width="26" height="26" rx="6" fill="#36bcf7" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.9s" begin="0.2s" fill="freeze"/>
    <text x="106" y="45" fill="#e6edf3" font-size="21" font-weight="700">neuratile</text>
    <rect x="212" y="28" width="72" height="21" rx="10.5" fill="#36bcf7" opacity="0.14"/>
    <text x="248" y="43" text-anchor="middle" fill="#36bcf7" font-size="11" font-weight="700">FOUNDER</text>
    <text x="106" y="72" fill="#8b949e" font-size="12.5">AI-first, open-source developer tools. Each project a tile in the bigger picture.</text>
    <text x="106" y="97" fill="#8b949e" font-size="11.5">Home of <tspan fill="#36bcf7" font-weight="700">Tessera</tspan> — the local-first AI testing IDE · and <tspan fill="#a371f7" font-weight="700">Visage AI</tspan> — cosmetic-procedure preview app</text>
    <text x="826" y="50" fill="#36bcf7" font-size="17" font-weight="700">&#8599;</text>
  </g>
</svg>
