<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 216" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, monospace">
  <rect x="1.5" y="1.5" width="857" height="213" rx="14" fill="#0d1117" stroke="#26334a" stroke-width="1.5"/>
  <rect x="1.5" y="1.5" width="857" height="213" rx="14" fill="none" stroke="#36bcf7" stroke-width="1.5" stroke-dasharray="80 2072" stroke-linecap="round" opacity="0.85"><animate attributeName="stroke-dashoffset" values="0;-2152" dur="9s" repeatCount="indefinite"/></rect>
  <rect x="30" y="30" width="44" height="44" rx="11" fill="#36bcf7" opacity="0.14"/><rect x="30" y="30" width="44" height="44" rx="11" fill="none" stroke="#36bcf7" stroke-width="1.5"/><text x="52" y="52.0" text-anchor="middle" dominant-baseline="central" fill="#36bcf7" font-size="23" font-weight="700">R</text>
  <circle cx="90" cy="52.0" r="3.5" fill="#36bcf7"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
  <text x="102" y="52.0" dominant-baseline="central" fill="#e6edf3" font-size="18" font-weight="700">RepoGraph Intelligence</text>
  <text x="34" y="92" font-size="12.5" fill="#8b949e">An AI-native structural intelligence engine that analyzes codebases as <tspan fill="#e6edf3" font-weight="600">dependency graphs</tspan>. Extracts</text>
  <text x="34" y="114" font-size="12.5" fill="#8b949e">imports, exports and symbols across JS/TS/Python, computes coupling metrics, estimates <tspan fill="#e6edf3" font-weight="600">blast radius</tspan></text>
  <text x="34" y="136" font-size="12.5" fill="#8b949e">for changes, and audits supply-chain deps against OSV.dev. React Flow live explorer + MCP server.</text>
  <text x="34" y="162" font-size="11" fill="#36bcf7" font-style="italic">◆ Rust core in active development</text>
  <rect x="34" y="176" width="89" height="20" rx="6" fill="#f1e05a" opacity="0.14"/><rect x="34" y="176" width="89" height="20" rx="6" fill="none" stroke="#f1e05a" stroke-width="1" opacity="0.5"/><text x="78" y="190" text-anchor="middle" fill="#f1e05a" font-size="10.5" font-weight="600">JavaScript</text>
  <rect x="131" y="176" width="48" height="20" rx="6" fill="#dea584" opacity="0.14"/><rect x="131" y="176" width="48" height="20" rx="6" fill="none" stroke="#dea584" stroke-width="1" opacity="0.5"/><text x="155" y="190" text-anchor="middle" fill="#dea584" font-size="10.5" font-weight="600">Rust</text>
  <rect x="187" y="176" width="89" height="20" rx="6" fill="#ff0072" opacity="0.14"/><rect x="187" y="176" width="89" height="20" rx="6" fill="none" stroke="#ff0072" stroke-width="1" opacity="0.5"/><text x="232" y="190" text-anchor="middle" fill="#ff0072" font-size="10.5" font-weight="600">React Flow</text>
  <rect x="284" y="176" width="96" height="20" rx="6" fill="#a9b1d6" opacity="0.14"/><rect x="284" y="176" width="96" height="20" rx="6" fill="none" stroke="#a9b1d6" stroke-width="1" opacity="0.5"/><text x="332" y="190" text-anchor="middle" fill="#a9b1d6" font-size="10.5" font-weight="600">Tree-sitter</text>
  <rect x="388" y="176" width="41" height="20" rx="6" fill="#8b949e" opacity="0.14"/><rect x="388" y="176" width="41" height="20" rx="6" fill="none" stroke="#8b949e" stroke-width="1" opacity="0.5"/><text x="408" y="190" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="600">MCP</text>
  <text x="830" y="52.0" text-anchor="end" dominant-baseline="central" fill="#36bcf7" font-size="16" font-weight="700">↗</text>
