  <text x="34" y="92" font-size="12.5" fill="#8b949e">A <tspan fill="#e6edf3" font-weight="600">local-first</tspan> AI testing IDE that turns any codebase into a full QA dossier without sending source</text>
  <text x="34" y="114" font-size="12.5" fill="#8b949e">to the cloud. Parses with Tree-sitter, embeds via Ollama, generates test plans, cases and defect</text>
  <text x="34" y="136" font-size="12.5" fill="#8b949e">reports through versioned prompts with JSON-Schema tool calling, each validated by a <tspan fill="#e6edf3" font-weight="600">Zod contract</tspan>.</text>
