  <rect x="277" y="42" width="68" height="20" rx="6" fill="#a371f7" opacity="0.14"/><rect x="277" y="42" width="68" height="20" rx="6" fill="none" stroke="#a371f7" stroke-width="1" opacity="0.5"/><text x="311" y="56" text-anchor="middle" fill="#a371f7" font-size="10.5" font-weight="600">founder</text>
