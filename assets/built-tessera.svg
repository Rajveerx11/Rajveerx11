  <rect x="249" y="164" width="54" height="20" rx="6" fill="#61dafb" opacity="0.14"/><rect x="249" y="164" width="54" height="20" rx="6" fill="none" stroke="#61dafb" stroke-width="1" opacity="0.5"/><text x="276" y="178" text-anchor="middle" fill="#61dafb" font-size="10.5" font-weight="600">React</text>
